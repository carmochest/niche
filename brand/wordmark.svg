<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" fill="currentColor">
  <title>NICHE wordmark</title>
  <!--
    Custom-drawn geometric letterforms. Stroke / bar weight 18px to match the
    N-mark system. Cap height 140, baseline at y=170, top at y=30.
    Letter x-positions:
      N: 30..130
      I: 158..176
      C: 204..304 (stroke arc, width 18, outer 100 wide)
      H: 332..432
      E: 460..560
  -->

  <!-- N : two verticals + diagonal -->
  <rect x="30"  y="30" width="18" height="140" rx="1.5"/>
  <rect x="112" y="30" width="18" height="140" rx="1.5"/>
  <polygon points="48,30 65,30 130,170 113,170"/>

  <!-- I : single vertical -->
  <rect x="158" y="30" width="18" height="140" rx="1.5"/>

  <!-- C : 3/4 circle stroke opening to the right -->
  <path
    d="M 295 60
       A 50 50 0 1 0 295 140"
    fill="none"
    stroke="currentColor"
    stroke-width="18"
    stroke-linecap="round"
  />

  <!-- H : two verticals + crossbar -->
  <rect x="332" y="30" width="18" height="140" rx="1.5"/>
  <rect x="414" y="30" width="18" height="140" rx="1.5"/>
  <rect x="350" y="91" width="64" height="18" rx="1.5"/>

  <!-- E : vertical + three arms -->
  <rect x="460" y="30"  width="18" height="140" rx="1.5"/>
  <rect x="478" y="30"  width="82" height="18" rx="1.5"/>
  <rect x="478" y="91"  width="68" height="18" rx="1.5"/>
  <rect x="478" y="152" width="82" height="18" rx="1.5"/>
</svg>
